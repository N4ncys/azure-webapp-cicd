name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/azure-webapp:${{ github.sha }} -f app/Dockerfile .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/azure-webapp:${{ github.sha }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name azure-webapp-cicd \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/azure-webapp:${{ github.sha }}